  - content: '{{urn:iso:std:iso:14812:3.5.6.2,shared transport service}} that transports
      {{urn:iso:std:iso:14812:3.6.2.1,passenger,passengers}} between two specified
      {{urn:iso:std:iso:14812:3.4.1.1,location,locations}}'
